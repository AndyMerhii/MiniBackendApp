<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Weather Forecast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Weather ForeCast🐳</h1>
    <p class="subtitle">Fetching live dynamic data from your C# container backend</p>

    <div class="forecast-container" id="forecast-grid">
        <p>Loading weather data...</p>
    </div>

    <script>
        fetch('/weatherforecast')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('forecast-grid');
                grid.innerHTML = ''; 

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';

                    const formattedDate = new Date(item.date).toLocaleDateString('en-US', { 
                        weekday: 'short', 
                        month: 'short', 
                        day: 'numeric' 
                    });

                    card.innerHTML = `
                        <div class="date">${formattedDate}</div>
                        <div class="temp">${item.temperatureC}°C</div>
                        <div class="temp-f">${item.temperatureF}°F</div>
                        <span class="summary">${item.summary}</span>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error fetching data:', error);
                document.getElementById('forecast-grid').innerHTML = '<p>Failed to load forecast data.</p>';
            });
    </script>
</body>
</html>
