name: MiniBackendApp CI/CD Pipeline

# Trigger workflow on every push or pull request targeting main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------------------
  # JOB 1: Continuous Integration (CI) - Build & Test
  # ----------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Set to your target .NET SDK version

    - name: Restore Dependencies
      run: dotnet restore

    - name: Build Application
      run: dotnet build --no-restore --configuration Release

  # ----------------------------------------------------
  # JOB 2: Continuous Deployment (CD) - Docker Build & Push
  # ----------------------------------------------------
  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test # Ensures Job 1 passes before running this

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Authenticate to Docker Hub using GitHub Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build and automatically push image to Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.ref == 'refs/heads/main' }} # Pushes only on commits to main
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/minibackendapp:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/minibackendapp:${{ github.sha }}